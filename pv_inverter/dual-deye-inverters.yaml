# Dual Deye Inverter — single ESP32 logger for two inverters on one RS-485 bus.
#
# Inverter A (12 kW, 3-phase LV): Modbus address 0x01  →  entity prefix: inv3p_
# Inverter B (6 kW, 1-phase LV):  Modbus address 0x02  →  entity prefix: inv1p_
#
# WIRING
#   ESP32 TX  → GPIO27 → RS-485 DE/RE/DI
#   ESP32 RX  → GPIO26 → RS-485 RO
#   Both inverters share the same bus, terminated at the far end.
#
# COMPILATION
#   esphome compile pv_inverter/dual-deye-inverters.yaml
#   esphome upload  pv_inverter/dual-deye-inverters.yaml

esphome:
  name: dual-deye-inverters
  friendly_name: "Dual Deye Inverters"
  comment: "Dual Deye SG0XLP3 + SG0XLP1 by Lewa-Reka"
  project:
    name: "lewa-reka.deye-inverter"
    version: "0.13.0"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: VERBOSE

# ── Secrets (same for both inverters) ──────────────────────────────────────────
substitutions:
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  api_key: !secret pv_inverter_api_key
  ota_password: !secret pv_inverter_ota_password
  fallback_password: !secret pv_inverter_fallback_password
  safe_mode_delay: "300s"

# ── Connectivity ────────────────────────────────────────────────────────────────
api:
  encryption:
    key: ${api_key}
  on_client_disconnected:
    - delay: ${safe_mode_delay}
    - if:
        condition:
          not: api.connected
        then:
          - logger.log: "Lost HA connection — activating safe mode on both inverters"
          - script.execute: inv3p_set_safe_modbus_registers
          - script.execute: inv1p_set_safe_modbus_registers

  on_client_connected:
    - logger.log: "Connection to HomeAssistant API restored"

ota:
  - platform: esphome
    id: ota_esphome
    password: ${ota_password}

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  ap:
    ssid: "Dual Deye Fallback"
    password: ${fallback_password}

captive_portal:

# ── Shared RS-485 Modbus bus ────────────────────────────────────────────────────
uart:
  id: modbus_uart
  tx_pin: GPIO27
  rx_pin: GPIO26
  baud_rate: 9600
  stop_bits: 1

modbus:
  id: modbus_hub
  uart_id: modbus_uart

# ── ESP diagnostics (once per device) ──────────────────────────────────────────
debug:
  update_interval: 60s

sensor:
  - platform: wifi_signal
    name: "ESP WiFi Signal"
    id: esp_wifi_signal
    icon: mdi:wifi
    update_interval: 60s
    entity_category: diagnostic
  - platform: uptime
    name: ESP Uptime
    id: esp_uptime
    type: seconds
    icon: mdi:timer-check
    update_interval: 60s
    entity_category: diagnostic
  - platform: debug
    free:
      name: ESP Heap Free
      id: esp_heap_free
      icon: mdi:memory
      entity_category: diagnostic
    block:
      name: ESP Heap Max Block
      id: esp_heap_max_block
      icon: mdi:memory
      entity_category: diagnostic
    loop_time:
      name: ESP Loop Time
      id: esp_loop_time
      icon: mdi:reload
      entity_category: diagnostic
    cpu_frequency:
      name: ESP CPU Frequency
      id: esp_cpu_frequency
      icon: mdi:cpu-32-bit
      unit_of_measurement: "MHz"
      filters:
        - multiply: 0.000001
      entity_category: diagnostic

text_sensor:
  - platform: wifi_info
    ip_address:
      name: ESP IP Address
      id: esp_ip_address
      icon: mdi:ip-network
      entity_category: diagnostic
    ssid:
      name: ESP WiFi SSID
      id: esp_wifi_ssid
      icon: mdi:access-point
      entity_category: diagnostic
    mac_address:
      name: ESP Mac Address
      id: esp_mac_address
      icon: mdi:expansion-card
      entity_category: diagnostic

# ── Inverter packages ───────────────────────────────────────────────────────────
packages:
  # 12 kW  3-phase LV — Modbus address 0x01
  inverter_3p:
    url: https://github.com/eradek/pv_inverters
    refresh: 0s
    files:
      - path: pv_inverter/deye_hybrid_3p_dual.yaml
        vars:
          modbus_inverter_address: "0x01"
          modbus_controller_id: deye_3p_controller
          inverter_prefix: "inv3p"
          inverter_name: "Deye 3P"
          default_maximum_battery_charge_current: "140"
          default_max_sell_power: "12000"
          default_system_work_mode: "Zero Export To Load"
          default_solar_sell: "on"
          default_force_off_grid: "off"
          enable_sync_time: "false"

  # 6 kW  1-phase LV — Modbus address 0x02
  inverter_1p:
    url: https://github.com/eradek/pv_inverters
    refresh: 0s
    files:
      - path: pv_inverter/deye_hybrid_1p_dual.yaml
        vars:
          modbus_inverter_address: "0x02"
          modbus_controller_id: deye_1p_controller
          inverter_prefix: "inv1p"
          inverter_name: "Deye 1P"
          default_maximum_battery_charge_current: "130"
          default_max_sell_power: "6000"
          default_system_work_mode: "Zero Export To Load"
          default_solar_sell: "on"
          default_force_off_grid: "off"
